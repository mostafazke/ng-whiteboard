<svg
  #svgContainer
  id="svgroot"
  [class]="'svgroot ' + selectedToolSignal()"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  tabindex="0"
  svg
  resizeHandler
  globalKeyboard
  [style.cursor]="cursor()"
>
  <svg
    id="svgcontent"
    [attr.width]="svgDimensions().width"
    [attr.height]="svgDimensions().height"
    [attr.viewBox]="svgViewBox()"
    [attr.x]="canvasX()"
    [attr.y]="canvasY()"
  >
    <defs>
      <!-- Grid -->
      <pattern id="smallGrid" [attr.width]="gridSize()" [attr.height]="gridSize()" patternUnits="userSpaceOnUse">
        <path
          [attr.d]="'M ' + gridSize() + ' 0 H 0 V ' + gridSize() + ''"
          fill="none"
          stroke="gray"
          stroke-width="0.5"
        />
      </pattern>
      <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
        <rect width="100" height="100" fill="url(#smallGrid)" />
        <path d="M 100 0 H 0 V 100" fill="none" stroke="gray" stroke-width="2" />
      </pattern>
    </defs>

    <rect width="100%" height="100%" [attr.fill]="backgroundColor()"></rect>

    @if (enableGrid()) {
    <g [attr.transform]="gridConfig().transform">
      <rect
        x="-100"
        y="-100"
        [attr.width]="gridConfig().width + 200"
        [attr.height]="gridConfig().height + 200"
        fill="url(#grid)"
      ></rect>
    </g>
    }

    <g [attr.transform]="contentTransform()" style="pointer-events: all">
      @for (item of filteredElements(); track item.id) {
      <g
        class="wb_element"
        [id]="'item_' + item.id"
        [attr.data-wb-id]="item.id"
        [attr.transform]="item.transform"
        [attr.opacity]="item | elementOpacity : layers()"
        [style.pointer-events]="item.isLocked ? 'none' : 'auto'"
        [style.mix-blend-mode]="item.blendMode"
        transform-origin="center"
      >
        @switch (item.type) { @case (types.Pen) {
        <g>
          <path
            fill="none"
            [attr.d]="item.points | pointsToPath : item.pathOptions"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.stroke-linecap]="item.style.lineCap"
            [attr.stroke-linejoin]="item.style.lineJoin"
            [attr.stroke]="item.style.strokeColor"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
          ></path>
        </g>
        } @case (types.Image) {
        <g>
          <image
            [attr.height]="item.height"
            [attr.width]="item.width"
            preserveAspectRatio="none"
            [attr.xlink:href]="item.src"
            [attr.href]="item.src"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.fill]="item.style.fill"
            [attr.stroke]="item.style.strokeColor"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
          ></image>
        </g>
        } @case (types.Line) {

        <g>
          <line
            [attr.x1]="item.x1"
            [attr.y1]="item.y1"
            [attr.x2]="item.x2"
            [attr.y2]="item.y2"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.stroke-linecap]="item.style.lineCap"
            [attr.stroke]="item.style.strokeColor"
          ></line>
        </g>
        } @case (types.Arrow) {
        <g>
          @if (item | arrowhead; as arrow) {
          <!-- Arrow body: use <path> for both straight and curved -->
          <path
            [attr.d]="arrow.pathD"
            fill="none"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.stroke-linecap]="item.style.lineCap"
            [attr.stroke]="item.style.strokeColor"
          ></path>
          @for (head of arrow.heads; track $index) {
            <path
              [attr.d]="head.d"
              [attr.transform]="head.transform"
              [attr.fill]="head.filled ? item.style.strokeColor : 'none'"
              [attr.stroke]="head.filled ? 'none' : item.style.strokeColor"
              [attr.stroke-width]="head.filled ? 0 : item.style.strokeWidth"
              [attr.stroke-linecap]="item.style.lineCap"
              stroke-linejoin="round"
            ></path>
          }
          }
        </g>
        } @case (types.Rectangle) {
        <g>
          <rect
            [attr.rx]="item.rx"
            [attr.width]="item.width"
            [attr.height]="item.height"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.fill]="item.style.fill"
            [attr.stroke]="item.style.strokeColor"
            [attr.stroke-linejoin]="item.style.lineJoin"
          ></rect>
        </g>
        } @case (types.Ellipse) {
        <g>
          <ellipse
            [attr.cx]="item.cx"
            [attr.cy]="item.cy"
            [attr.rx]="item.rx"
            [attr.ry]="item.ry"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
            [attr.stroke-width]="item.style.strokeWidth"
            [attr.stroke]="item.style.strokeColor"
            [attr.fill]="item.style.fill"
          ></ellipse>
        </g>
        } @case (types.Text) {
        <g>
          <text
            text-anchor="start"
            [attr.font-size]="item.style.fontSize"
            [attr.font-family]="item.style.fontFamily"
            [attr.fill]="item.style.color"
            [attr.font-style]="item.style.fontStyle"
            [attr.font-weight]="item.style.fontWeight"
            alignment-baseline="before-edge"
            [attr.stroke-linecap]="item.style.lineCap"
            [attr.stroke-linejoin]="item.style.lineJoin"
            [attr.stroke-dasharray]="item.style.dasharray"
            [attr.stroke-dashoffset]="item.style.dashoffset"
            [attr.stroke]="item.style.strokeColor"
            [attr.stroke-width]="item.style.strokeWidth"
          >
            @for (line of item.text.split('\n'); track $index) {
            <tspan [attr.x]="0" [attr.dy]="$index === 0 ? 0 : (item.style.fontSize || 16) * 1.2">{{ line }}</tspan>
            }
          </text>
        </g>
        } }
      </g>
      } @if (selectionBoxSignal(); as box) {

      <!-- Connection point snap indicator (shown during arrow drawing/reconnecting) -->
      @if (snapIndicator(); as snap) {
        <circle
          class="snap-indicator"
          [attr.cx]="snap.x"
          [attr.cy]="snap.y"
          r="8"
          fill="rgba(76, 175, 80, 0.3)"
          stroke="#4CAF50"
          stroke-width="2"
          pointer-events="none"
        ></circle>
      }

      <!-- Connection points on hovered shape during arrow drawing -->
      @for (cp of visibleConnectionPoints(); track cp.id) {
        <circle
          class="connection-point"
          [attr.cx]="cp.position.x"
          [attr.cy]="cp.position.y"
          r="4"
          fill="rgba(33, 150, 243, 0.4)"
          stroke="#2196F3"
          stroke-width="1"
          pointer-events="none"
        ></circle>
      }

      <rect
        [attr.x]="box.x"
        [attr.y]="box.y"
        [attr.width]="box.width"
        [attr.height]="box.height"
        stroke="blue"
        stroke-dasharray="5,5"
        fill="transparent"
      />
      } @if (boundingBoxSignal(); as box) {
      <g
        id="selectorParentGroup"
        [attr.transform]="
          'rotate(' + box.rotation + ',' + (box.x + box.width / 2) + ',' + (box.y + box.height / 2) + ')'
        "
      >
        <rect
          id="selectorBox"
          [attr.x]="box.x"
          [attr.y]="box.y"
          [attr.width]="box.width"
          [attr.height]="box.height"
          fill="transparent"
          stroke="dodgerblue"
          stroke-width="1"
          cursor="move"
          pointer-events="all"
        ></rect>

        <!-- Side Resize Lines -->
        <ng-container *ngFor="let side of ['n', 's', 'e', 'w']">
          <rect
            [attr.id]="'selectorGrip_resize_' + side"
            [attr.x]="side === 'n' || side === 's' ? box.x : side === 'e' ? box.x + box.width - 5 : box.x - 5"
            [attr.y]="side === 'n' ? box.y - 5 : side === 's' ? box.y + box.height - 5 : box.y"
            [attr.width]="side === 'n' || side === 's' ? box.width : 10"
            [attr.height]="side === 'n' || side === 's' ? 10 : box.height"
            fill="transparent"
            stroke="transparent"
            [attr.cursor]="side | gripCursor : box.rotation"
            pointer-events="all"
          ></rect>
        </ng-container>

        <!-- Corner Resize Grips -->
        <ng-container *ngFor="let grip of ['nw', 'ne', 'se', 'sw']">
          <rect
            [attr.id]="'selectorGrip_resize_' + grip"
            [attr.x]="box.x + (grip === 'ne' || grip === 'se' ? box.width : 0) - 5"
            [attr.y]="box.y + (grip === 'se' || grip === 'sw' ? box.height : 0) - 5"
            width="10"
            height="10"
            fill="white"
            stroke="dodgerblue"
            stroke-width="1"
            [attr.cursor]="grip | gripCursor : box.rotation"
          ></rect>
        </ng-container>

        <circle
          id="selectorGrip_rotate_n"
          [attr.cx]="box.handles.rotateHandle.x"
          [attr.cy]="box.handles.rotateHandle.y"
          r="6"
          fill="white"
          stroke="green"
          stroke-width="1"
          cursor="grab"
        ></circle>

        <!-- Corner Rotate Grips -->
        <ng-container *ngFor="let grip of ['nw', 'ne', 'se', 'sw']">
          <circle
            [attr.id]="'selectorGrip_rotate_' + grip"
            [attr.cx]="box.x + (grip === 'ne' || grip === 'se' ? box.width : -20) + 10"
            [attr.cy]="box.y + (grip === 'se' || grip === 'sw' ? box.height : -20) + 10"
            r="6"
            fill="none"
            stroke="none"
            stroke-width="1"
            [attr.cursor]="'rotate_' + grip | gripCursor : box.rotation"
          ></circle>
        </ng-container>
      </g>
      }

      <!-- 2-point endpoint handles for selected arrows / lines -->
      @for (handle of lineEndpointHandles(); track handle.elementId + '_' + handle.end) {
        <circle
          class="line-endpoint-handle"
          [attr.id]="'endpointHandle_' + handle.elementId + '_' + handle.end"
          [attr.cx]="handle.x"
          [attr.cy]="handle.y"
          r="6"
          [attr.fill]="handle.bound ? '#4CAF50' : 'white'"
          stroke="dodgerblue"
          stroke-width="1.5"
          cursor="crosshair"
          pointer-events="all"
          [attr.data-arrow-id]="handle.elementId"
          [attr.data-handle]="handle.end"
        ></circle>
      }

      <!-- Middle curve handle for selected arrows -->
      @for (handle of curveHandles(); track handle.elementId) {
        <circle
          class="curve-handle"
          [attr.id]="'curveHandle_' + handle.elementId"
          [attr.cx]="handle.x"
          [attr.cy]="handle.y"
          r="5"
          [attr.fill]="handle.isCurved ? '#FF9800' : 'white'"
          [attr.stroke]="handle.isCurved ? '#E65100' : '#999'"
          stroke-width="1.5"
          cursor="move"
          pointer-events="all"
          [attr.data-arrow-id]="handle.elementId"
          data-handle="curve"
        ></circle>
      }
    </g>
  </svg>
</svg>
