name: Test and Release

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so `nx format:check` can diff against the base branch.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format check
        run: npx nx format:check --base=origin/master

      - name: Lint
        run: npx nx run-many -t lint

      - name: Test (library)
        run: yarn test:ci

      # NOTE: demo unit tests are intentionally excluded — they are currently
      # broken (missing jsdom polyfills / HttpClient provider, plus a stale
      # basic.component.spec). The demo is still validated via lint + build
      # below. Re-add `nx test demo --ci` here once those specs are fixed.

      - name: Build library
        run: yarn build:lib

      - name: Build demo
        run: yarn build:demo

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage/ng-whiteboard/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  demo:
    needs: validate
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build demo
        run: yarn build:demo

      - name: Publish demo to GitHub Pages
        run: npx angular-cli-ghpages --dir=./dist/demo/browser --name="Mostafa Zaki" --email=mmostafazke@gmail.com
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lib:
    needs: validate
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build library
        run: yarn build:lib

      - name: Publish library
        run: yarn publish:lib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
